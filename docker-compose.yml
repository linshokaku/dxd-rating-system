services:
  db:
    image: postgres:16
    container_name: dxd-rating-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dxd_rating
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dxd_rating"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
